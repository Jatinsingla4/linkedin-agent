name: LinkedIn Agent

on:
  schedule:
    # Mon, Tue, Wed, Thu — 9:00 AM IST (3:30 AM UTC) — peak weekday window
    - cron: "30 3 * * 1,2,3,4"
    # Sunday — 10:30 AM IST (5:00 AM UTC) — after calendar planning (9 AM)
    - cron: "0 5 * * 0"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (generate post but don't publish)"
        required: false
        default: "false"
        type: boolean

jobs:
  post:
    name: Generate & Post
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LinkedIn Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          POSTS_PER_WEEK: "5"
          APPROVAL_TIMEOUT_HOURS: "12"
          GENERATE_VERSIONS: "2"
          ENABLE_FIRST_COMMENT: "true"
          YOUR_NAME: "Jatin"
          YOUR_ROLE: "AI Executive"
          YOUR_COMPANY: "Grapes Worldwide"
          YOUR_LINKEDIN_NICHE: "marketing,branding,AI,agency life,startup"
          PERSONAL_STORY_DAY: "2"
          POLL_DAY: "6"
          CAROUSEL_DAY: "5"
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python orchestrator.py

      - name: Save agent state back to repo
        if: always()
        run: |
          git config user.name "LinkedIn Agent Bot"
          git config user.email "agent@linkedin-bot.com"
          git add agent_state.json
          git diff --staged --quiet || git commit -m "chore: update agent state [skip ci]"
          git push || true

      - name: Upload agent log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-log-${{ github.run_id }}
          path: agent.log
          retention-days: 30
