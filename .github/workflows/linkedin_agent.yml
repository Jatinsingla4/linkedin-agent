name: LinkedIn Agent

on:
  schedule:
    # Tue, Thu, Sat, Sun at 8:30 AM IST (3:00 AM UTC) — peak LinkedIn engagement
    - cron: "0 3 * * 2,4,6,0"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (generate post but don't publish)"
        required: false
        default: "false"
        type: boolean

jobs:
  post:
    name: Generate & Post
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LinkedIn Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          POSTS_PER_WEEK: "4"
          APPROVAL_TIMEOUT_HOURS: "12"
          GENERATE_VERSIONS: "2"
          ENABLE_FIRST_COMMENT: "true"
          YOUR_NAME: "Jatin"
          YOUR_ROLE: "AI Executive"
          YOUR_COMPANY: "Grapes Worldwide"
          YOUR_LINKEDIN_NICHE: "marketing,branding,AI,FMCG,agency life,startup"
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python orchestrator.py

      - name: Upload agent log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-log-${{ github.run_id }}
          path: agent.log
          retention-days: 30
