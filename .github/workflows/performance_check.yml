name: Performance Reminder

on:
  schedule:
    # Runs every day at 11:00 AM IST (5:30 AM UTC)
    - cron: "30 5 * * *"

  workflow_dispatch:

jobs:
  remind:
    name: Send Performance Reminders
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send performance reminders
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          YOUR_NAME: "Jatin"
          YOUR_ROLE: "AI Executive"
          YOUR_COMPANY: "Grapes Worldwide"
          YOUR_LINKEDIN_NICHE: "marketing,branding,AI,FMCG,agency life,startup"
        run: python -m entrypoints.performance_check

      - name: Save agent state back to repo
        if: always()
        run: |
          git config user.name "LinkedIn Agent Bot"
          git config user.email "agent@linkedin-bot.com"
          git add agent_state.json
          git diff --staged --quiet || git commit -m "chore: update agent state [skip ci]"
          git push || true
