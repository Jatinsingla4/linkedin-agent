name: Content Calendar Planner

on:
  schedule:
    # Every Sunday at 9:00 AM IST (3:30 AM UTC) — plan the week ahead
    - cron: "30 3 * * 0"

  workflow_dispatch: {}

jobs:
  plan:
    name: Generate Weekly Content Plan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Calendar Planner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          YOUR_NAME: "Jatin"
          YOUR_ROLE: "AI Executive"
          YOUR_COMPANY: "Grapes Worldwide"
          YOUR_LINKEDIN_NICHE: "Technical,branding,AI,agency life,startup"
        run: python calendar_planner.py

      - name: Save content queue to repo
        if: always()
        run: |
          git config user.name "LinkedIn Agent Bot"
          git config user.email "agent@linkedin-bot.com"
          git add agent_state.json
          git diff --staged --quiet || git commit -m "chore: update content queue [skip ci]"
          git push || true
